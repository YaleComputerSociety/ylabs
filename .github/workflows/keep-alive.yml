name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: curl -fsS --max-time 30 https://ylabs-gr4v.onrender.com/api/config || echo "Service warming up"
