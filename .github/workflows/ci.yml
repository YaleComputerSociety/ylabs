name: CI

on:
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install:all

      - name: Run server typecheck
        run: npx tsc --noEmit -p server/tsconfig.json

      - name: Run server tests
        run: yarn --cwd server test

      - name: Run client tests
        run: yarn --cwd client test:ci

      - name: Check high severity dependency advisories
        run: yarn npm audit --severity high

      - name: Build server and client
        run: yarn build
