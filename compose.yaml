services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: ylabs-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: local_development_master_key
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
